<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JeremiahServer — Status</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f0f;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container { text-align: center; max-width: 520px; padding: 2rem; width: 100%; }
    .icon {
      width: 64px; height: 64px;
      margin: 0 auto 1.5rem;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .icon svg { width: 32px; height: 32px; fill: none; stroke-width: 2; }
    .icon.red { background: #1a0000; border: 2px solid #7f1d1d; }
    .icon.red svg { stroke: #ef4444; }
    .icon.yellow { background: #1a1200; border: 2px solid #92400e; }
    .icon.yellow svg { stroke: #f59e0b; }
    .icon.blue { background: #00101a; border: 2px solid #1e4a6e; }
    .icon.blue svg { stroke: #38bdf8; }
    .brand { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.2em; color: #d97706; text-transform: uppercase; margin-bottom: 0.75rem; }
    h1 { font-size: 1.75rem; font-weight: 700; color: #fff; margin-bottom: 0.75rem; }
    p { color: #6b7280; font-size: 0.9rem; line-height: 1.6; margin-bottom: 2rem; }
    .status { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 1rem 1.5rem; margin-bottom: 1.5rem; text-align: left; }
    .status-row { display: flex; justify-content: space-between; align-items: center; padding: 0.4rem 0; font-size: 0.8rem; border-bottom: 1px solid #1f1f1f; }
    .status-row:last-child { border-bottom: none; }
    .status-label { color: #6b7280; }
    .status-val { font-weight: 600; }
    .val-red { color: #ef4444; }
    .val-yellow { color: #f59e0b; }
    .val-blue { color: #38bdf8; }
    .val-green { color: #4ade80; }
    .val-gold { color: #d97706; }
    .btn { background: transparent; padding: 0.6rem 1.5rem; border-radius: 8px; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; margin: 0.25rem; }
    .btn-red { border: 1px solid #7f1d1d; color: #ef4444; }
    .btn-red:hover { background: rgba(127,29,29,0.2); }
    .btn-gold { border: 1px solid #92400e; color: #d97706; }
    .btn-gold:hover { background: rgba(146,64,14,0.2); }
    .spin { animation: spin 2s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon red" id="icon">
      <svg id="iconsvg" viewBox="0 0 24 24">
        <path id="iconpath" d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
      </svg>
    </div>
    <div class="brand">JeremiahServer</div>
    <h1 id="title">Server Offline</h1>
    <p id="desc">The server is currently unreachable.</p>

    <div class="status">
      <div class="status-row">
        <span class="status-label">Status</span>
        <span class="status-val val-red" id="statusval">Unreachable</span>
      </div>
      <div class="status-row">
        <span class="status-label">Down since</span>
        <span class="status-val val-gold" id="downsince">—</span>
      </div>
      <div class="status-row">
        <span class="status-label">Down for</span>
        <span class="status-val val-gold" id="elapsed">0s</span>
      </div>
      <div class="status-row">
        <span class="status-label">Checking again in</span>
        <span class="status-val val-gold" id="countdown">10s</span>
      </div>
    </div>

    <div>
      <button class="btn btn-red" id="retrybtn" onclick="checkAll()">Check Now</button>
    </div>

  </div>

  <script>
    var SERVER = 'https://jeremiahserver';
    var RETRY_INTERVAL = 10;
    var STATUS_JSON = 'https://raw.githubusercontent.com/sapphier7855/ServerUI/main/status.json';
    var startTime = Date.now();

    var modes = {
      reboot: {
        color: 'yellow',
        title: 'Server Rebooting',
        desc: 'The server is rebooting and will be back online shortly.',
        status: 'Rebooting',
        statusClass: 'val-yellow',
        iconPath: 'M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15',
        spin: true
      },
      shutdown: {
        color: 'red',
        title: 'Server Shutdown',
        desc: 'The server has been shut down and will not come back online automatically.',
        status: 'Offline',
        statusClass: 'val-red',
        iconPath: 'M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636',
        spin: false
      },
      update: {
        color: 'blue',
        title: 'Server Updating',
        desc: 'The server is applying system updates and will be back online shortly.',
        status: 'Updating',
        statusClass: 'val-blue',
        iconPath: 'M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12',
        spin: true
      },
      unknown: {
        color: 'red',
        title: 'Server Offline',
        desc: 'The server is currently unreachable. It may be rebooting or experiencing an issue.',
        status: 'Unreachable',
        statusClass: 'val-red',
        iconPath: 'M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z',
        spin: false
      }
    };

    var autoRetryEnabled = true;

    function applyMode(reason) {
      var m = modes[reason] || modes.unknown;
      var icon = document.getElementById('icon');
      var svg = document.getElementById('iconsvg');
      icon.className = 'icon ' + m.color;
      document.getElementById('iconpath').setAttribute('d', m.iconPath);
      if (m.spin) svg.classList.add('spin'); else svg.classList.remove('spin');
      document.getElementById('title').textContent = m.title;
      document.getElementById('desc').textContent = m.desc;
      var sv = document.getElementById('statusval');
      sv.textContent = m.status;
      sv.className = 'status-val ' + m.statusClass;
      if (reason === 'shutdown') {
        autoRetryEnabled = false;
        document.getElementById('countdown').textContent = 'Manual only';
      } else {
        autoRetryEnabled = true;
        document.getElementById('countdown').textContent = retry + 's';
      }
    }

    function applyStatus(d) {
      applyMode(d.reason || 'unknown');
      var ref = d.action_time || d.heartbeat;
      if (ref) {
        var downAt = new Date(ref * 1000);
        document.getElementById('downsince').textContent = downAt.toLocaleTimeString();
        startTime = downAt.getTime();
      }
    }

    function formatElapsed(ms) {
      var s = Math.floor(ms / 1000);
      var m = Math.floor(s / 60);
      var h = Math.floor(m / 60);
      if (h > 0) return h + 'h ' + (m % 60) + 'm';
      if (m > 0) return m + 'm ' + (s % 60) + 's';
      return s + 's';
    }

    function loadStatus() {
      fetch(STATUS_JSON + '?t=' + Date.now(), {cache: 'no-store'})
        .then(function(r) { return r.json(); })
        .then(applyStatus)
        .catch(function() { applyMode('unknown'); });
    }

    function checkAll() {
      var btn = document.getElementById('retrybtn');
      var originalText = btn.textContent;
      btn.textContent = 'Checking...';
      btn.disabled = true;
      retry = RETRY_INTERVAL;

      loadStatus();
      fetch(STATUS_JSON + '?t=' + Date.now(), {cache: 'no-store'})
        .then(function(r) { return r.json(); })
        .then(function(d) {
          var now = Date.now() / 1000;
          var fresh = d.heartbeat && (now - d.heartbeat) < 90;
          if (fresh && (!d.reason || d.reason === 'unknown')) {
            window.location.href = SERVER;
            return;
          }
          btn.textContent = originalText;
          btn.disabled = false;
        })
        .catch(function() {
          btn.textContent = originalText;
          btn.disabled = false;
        });
    }

    document.getElementById('downsince').textContent = new Date().toLocaleTimeString();
    var retry = RETRY_INTERVAL;
    setInterval(function() {
      document.getElementById('elapsed').textContent = formatElapsed(Date.now() - startTime);
      if (!autoRetryEnabled) return;
      retry--;
      var el = document.getElementById('countdown');
      el.textContent = retry + 's';
      if (retry <= 0) {
        retry = RETRY_INTERVAL;
        checkAll();
      }
    }, 1000);

    loadStatus();
  </script>
</body>
</html>
